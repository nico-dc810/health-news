services:
  - type: web
    name: health-media-demo
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: health-media-db
          property: connectionString
      - key: INTELLIGENCE_AUTO_CRAWL_ENABLED
        value: false
      - key: INTELLIGENCE_AUTO_CRAWL_WORKSPACE_ID
        value: demo-workspace
      - key: INTELLIGENCE_AUTO_CRAWL_INTERVAL_HOURS
        value: 24
      - key: INTELLIGENCE_AUTO_CRAWL_MAX_SOURCES
        value: 10
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://nico-dc810.github.io,https://health-radar.pages.dev

databases:
  - name: health-media-db
    plan: free
